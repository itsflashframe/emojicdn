<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emoji CDN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #21262d;
      --border:   #30363d;
      --border2:  #484f58;
      --text:     #c9d1d9;
      --muted:    #8b949e;
      --blue:     #58a6ff;
      --green:    #3fb950;
      --red:      #f85149;
      --yellow:   #d29922;
      --purple:   #bc8cff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
      gap: 48px;
    }

    .hero {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .hero h1 { font-size: 2.4rem; font-weight: 700; }
    .hero p   { color: var(--muted); font-size: 1.05rem; }
    .hero a {
      color: var(--blue); text-decoration: none; font-weight: 600;
      border: 1px solid var(--border); padding: 10px 22px; border-radius: 6px;
      background: var(--surface); transition: .15s;
    }
    .hero a:hover { background: var(--surface2); border-color: var(--border2); }

    .search-section {
      width: 100%; max-width: 900px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .search-section-hdr {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }
    .search-section-hdr h2 { font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
    .search-section-hdr p  { color: var(--muted); font-size: .85rem; margin-top: 4px; }

    .search-body { padding: 20px 24px; }

    .search-input-row {
      display: flex; gap: 10px; margin-bottom: 16px;
    }
    .search-input {
      flex: 1;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 14px;
      color: var(--text); font-size: 1rem;
      outline: none; transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--blue); }
    .search-input::placeholder { color: var(--muted); }

    .search-style-toggles {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 20px;
    }
    .style-toggle {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px;
      cursor: pointer; font-size: .8rem; user-select: none;
      transition: border-color .15s, background .15s;
    }
    .style-toggle.active { border-color: var(--blue); background: rgba(88,166,255,.1); color: var(--blue); }
    .style-toggle:hover   { border-color: var(--border2); }

    .search-results-area {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
      max-height: 260px;
      overflow-y: auto;
    }
    .search-result-chip {
      display: flex; flex-direction: column; align-items: center;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 6px;
      cursor: pointer; transition: border-color .15s;
      text-align: center; gap: 4px;
    }
    .search-result-chip:hover { border-color: var(--blue); }
    .search-result-chip.selected { border-color: var(--blue); background: rgba(88,166,255,.08); }
    .search-result-chip .chip-em  { font-size: 1.5rem; line-height: 1; }
    .search-result-chip .chip-name { font-size: .65rem; color: var(--muted); word-break: break-word; }

    .search-preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px;
    }
    .preview-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      text-align: center;
    }
    .preview-card .pv-style { font-size: .72rem; color: var(--muted); font-weight: 600; }
    .preview-card .pv-img-wrap {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-card img {
      width: 48px; height: 48px; object-fit: contain;
      opacity: 0; transition: opacity .15s ease;
    }
    .preview-card img.loaded { opacity: 1; }
    .preview-card .pv-native { font-size: 2rem; line-height: 1; }
    .search-placeholder {
      grid-column: 1/-1;
      text-align: center; color: var(--muted);
      font-size: .88rem; padding: 24px 0;
    }

    .scanner {
      width: 100%; max-width: 900px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .scanner-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .scanner-header:hover { background: var(--surface2); }
    .scanner-header h2 { font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
    .scanner-header .chevron { color: var(--muted); font-size: .85rem; transition: transform .2s; }
    .scanner-header.open .chevron { transform: rotate(180deg); }

    .scanner-body { display: none; padding: 24px; }
    .scanner-body.open { display: block; }

    .style-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
    }
    .style-check {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 12px;
      cursor: pointer; font-size: .88rem;
      transition: border-color .15s;
    }
    .style-check:hover { border-color: var(--border2); }
    .style-check input { accent-color: var(--blue); cursor: pointer; }
    .style-check.checked { border-color: var(--blue); }

    .options-row {
      display: flex; align-items: center; gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      font-size: .88rem; color: var(--muted);
    }
    .options-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .options-row input[type=checkbox] { accent-color: var(--blue); }

    .controls {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .btn {
      padding: 8px 18px; border-radius: 6px; border: 1px solid var(--border);
      font-size: .9rem; cursor: pointer; font-weight: 500;
      transition: .15s; background: var(--surface2); color: var(--text);
    }
    .btn:hover:not(:disabled) { border-color: var(--border2); }
    .btn.primary { background: var(--blue); color: #000; border-color: var(--blue); }
    .btn.primary:hover:not(:disabled) { background: #79b8ff; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .progress-wrap { margin-bottom: 16px; }
    .progress-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; width: 0; border-radius: 99px; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width .2s; }
    .progress-label { font-size: .82rem; color: var(--muted); min-height: 1.2em; }

    .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; margin-bottom: 24px; }
    .summary-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
    .summary-card .sname  { font-size: .8rem; color: var(--muted); margin-bottom: 4px; }
    .summary-card .scount { font-size: 1.3rem; font-weight: 700; }
    .summary-card .scount.ok   { color: var(--green); }
    .summary-card .scount.warn { color: var(--yellow); }
    .summary-card .scount.bad  { color: var(--red); }
    .summary-card .stotal { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    .result-section { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
    .result-section-hdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; background: var(--surface2); font-size: .9rem; font-weight: 600; user-select: none; }
    .result-section-hdr:hover { background: #2a2f36; }
    .result-section-hdr .badge { background: var(--red); color: #fff; font-size: .72rem; border-radius: 99px; padding: 1px 8px; font-weight: 700; }
    .result-section-hdr .badge.zero { background: var(--green); }
    .result-body { display: none; padding: 14px 16px; }
    .result-body.open { display: block; }

    .missing-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .missing-item { display: flex; flex-direction: column; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; min-width: 68px; font-size: .72rem; color: var(--muted); text-align: center; gap: 4px; }
    .missing-item .em  { font-size: 1.5rem; line-height: 1; }
    .missing-item .hex { font-family: monospace; word-break: break-all; }
    .missing-item:hover { border-color: var(--red); }
    .no-missing { font-size: .85rem; color: var(--green); padding: 6px 0; }

    .divider { width: 100%; max-width: 900px; border: none; border-top: 1px solid var(--border); }
    .note { font-size: .8rem; color: var(--muted); margin-top: -12px; }
  </style>
</head>
<body>

  <div class="hero">
    <h1>🫠 Emoji CDN</h1>

    <a href="https://github.com/itsflashframe/emojicdn/tree/main">View Source on GitHub</a>
  </div>


</body>
</html>
