<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Emoji CDN </title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117; color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh; padding: 24px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 4px; color: #e6edf3; }
    .sub { color: #8b949e; font-size: 0.9rem; margin-bottom: 24px; }
    .controls {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 16px; margin-bottom: 20px;
    }
    select, input[type=number] {
      background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      border-radius: 6px; padding: 7px 12px; font-size: 0.85rem;
    }
    label { font-size: 0.85rem; color: #8b949e; }
    .btn {
      padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; transition: 0.15s;
    }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-stop { background: #da3633; color: #fff; }
    .btn-stop:hover { background: #f85149; }
    .btn-export { background: #1f6feb; color: #fff; }
    .btn-export:hover { background: #388bfd; }
    .progress-bar-wrap {
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      height: 10px; overflow: hidden; margin-bottom: 12px;
    }
    .progress-bar { height: 100%; background: #238636; transition: width 0.1s; width: 0; }
    .stats {
      display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px;
      font-size: 0.82rem;
    }
    .stat { display: flex; flex-direction: column; }
    .stat-val { font-size: 1.2rem; font-weight: 700; color: #e6edf3; }
    .stat-ok  .stat-val { color: #3fb950; }
    .stat-err .stat-val { color: #f85149; }
    .stat-skip .stat-val { color: #d29922; }
    .stat-lbl { color: #8b949e; font-size: 0.78rem; }
    .log-header {
      display: grid; grid-template-columns: 50px 1fr 180px 90px; gap: 8px;
      background: #161b22; border: 1px solid #30363d; border-radius: 6px 6px 0 0;
      padding: 8px 12px; font-size: 0.78rem; color: #8b949e; font-weight: 600;
    }
    #resultList {
      border: 1px solid #30363d; border-top: none; border-radius: 0 0 6px 6px;
      max-height: 420px; overflow-y: auto; background: #0d1117;
    }
    .row {
      display: grid; grid-template-columns: 50px 1fr 180px 90px; gap: 8px;
      padding: 5px 12px; font-size: 0.82rem; border-bottom: 1px solid #21262d;
      align-items: center;
    }
    .row:last-child { border-bottom: none; }
    .row.err  { background: rgba(248,81,73,0.06); }
    .row.ok   { background: rgba(63,185,80,0.04); }
    .emoji-cell { font-size: 1.3rem; }
    .hex-cell   { font-family: monospace; font-size: 0.75rem; color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .style-cell { color: #58a6ff; font-size: 0.78rem; }
    .status-ok   { color: #3fb950; font-weight: 600; }
    .status-err  { color: #f85149; font-weight: 600; }
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 4px 12px; border-radius: 20px; border: 1px solid #30363d;
      background: #161b22; color: #8b949e; cursor: pointer; font-size: 0.8rem;
      transition: 0.1s;
    }
    .filter-btn.active { background: #21262d; color: #e6edf3; border-color: #58a6ff; }
    #statusMsg { font-size: 0.82rem; color: #8b949e; margin-bottom: 8px; min-height: 18px; }
    .preview-img { width: 24px; height: 24px; object-fit: contain; vertical-align: middle; }
  </style>
</head>
<body>
  <h1>🔍 Emoji CDN Scanner</h1>
  <p class="sub">Scan all emojis across all styles to find 404s. Results are not cached — runs live against your CDN.</p>

  <div class="controls">
    <div>
      <label>CDN Base URL</label><br>
      <input type="text" id="cdnBase" value="https://emojiswapcdn.vercel.app/api/index"
        style="width:320px;margin-top:4px">
    </div>
    <div>
      <label>Style(s)</label><br>
      <select id="styleSelect" style="margin-top:4px">
        <option value="all">All styles</option>
        <option value="apple">Apple</option>
        <option value="google">Google</option>
        <option value="facebook">Facebook</option>
        <option value="twitter">Twitter</option>
        <option value="messenger">Messenger</option>
        <option value="blobmoji">Blobmoji</option>
        <option value="oneui">One UI</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="emojitwo">EmojiTwo</option>
        <option value="opencolor">OpenMoji Color</option>
        <option value="openblack">OpenMoji Black</option>
        <option value="fluent3d">Fluent 3D</option>
        <option value="fluentflat">Fluent Flat</option>
        <option value="fluenthc">Fluent HC</option>
      </select>
    </div>
    <div>
      <label>Concurrency</label><br>
      <input type="number" id="concurrency" value="8" min="1" max="20"
        style="width:70px;margin-top:4px">
    </div>
    <div style="margin-top:18px;display:flex;gap:8px">
      <button class="btn btn-primary" id="startBtn" onclick="startScan()">▶ Start Scan</button>
      <button class="btn btn-stop" id="stopBtn" onclick="stopScan()" style="display:none">⏹ Stop</button>
      <button class="btn btn-export" onclick="exportResults()">⬇ Export JSON</button>
    </div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="stats">
    <div class="stat stat-ok">  <span class="stat-val" id="cntOk">0</span>   <span class="stat-lbl">OK</span></div>
    <div class="stat stat-err"> <span class="stat-val" id="cntErr">0</span>  <span class="stat-lbl">404 / Error</span></div>
    <div class="stat stat-skip"><span class="stat-val" id="cntTotal">0</span><span class="stat-lbl">Scanned</span></div>
    <div class="stat">          <span class="stat-val" id="cntLeft">—</span>  <span class="stat-lbl">Remaining</span></div>
  </div>
  <div id="statusMsg"></div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('err',this)">Errors only</button>
    <button class="filter-btn" onclick="setFilter('ok',this)">OK only</button>
  </div>

  <div class="log-header">
    <span>Emoji</span><span>Hex</span><span>Style</span><span>Status</span>
  </div>
  <div id="resultList"></div>

<script>
// Full emoji list loaded from a public source (emoji-datasource compatible format)
const CDN_EMOJI_LIST = 'https://cdn.jsdelivr.net/npm/emoji-datasource-apple@latest/emoji.json';

const ALL_STYLES = [
  'apple','google','facebook','twitter','messenger',
  'blobmoji','oneui','whatsapp','emojitwo',
  'opencolor','openblack','fluent3d','fluentflat','fluenthc'
];

let emojiList = [];
let results   = [];
let scanning  = false;
let filterMode = 'all';

async function loadEmojiList() {
  const statusMsg = document.getElementById('statusMsg');
  if (emojiList.length > 0) return;
  statusMsg.textContent = 'Loading emoji list…';
  try {
    const r = await fetch(CDN_EMOJI_LIST);
    const data = await r.json();
    emojiList = data.filter(e => e.char).map(e => ({
      char: e.char,
      hex: e.unified.toLowerCase(),
      name: e.name || e.short_name,
    }));
    statusMsg.textContent = `Loaded ${emojiList.length} emojis.`;
  } catch (e) {
    statusMsg.textContent = 'Failed to load emoji list: ' + e.message;
  }
}

function setFilter(mode, btn) {
  filterMode = mode;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderResults();
}

function renderResults() {
  const list = document.getElementById('resultList');
  const rows = filterMode === 'all' ? results
    : filterMode === 'err' ? results.filter(r => r.status !== 200)
    : results.filter(r => r.status === 200);
  list.innerHTML = rows.slice(-300).map(r => `
    <div class="row ${r.status === 200 ? 'ok' : 'err'}">
      <span class="emoji-cell">${r.char}</span>
      <span class="hex-cell" title="${r.hex}">${r.hex}</span>
      <span class="style-cell">${r.style}</span>
      <span class="${r.status === 200 ? 'status-ok' : 'status-err'}">${r.status === 200 ? '✓ OK' : '✗ ' + r.status}</span>
    </div>`).join('');
}

function updateStats(total) {
  const ok  = results.filter(r => r.status === 200).length;
  const err = results.filter(r => r.status !== 200).length;
  document.getElementById('cntOk').textContent    = ok;
  document.getElementById('cntErr').textContent   = err;
  document.getElementById('cntTotal').textContent = results.length;
  document.getElementById('cntLeft').textContent  = Math.max(0, total - results.length);
  const pct = total > 0 ? (results.length / total) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

async function checkOne(cdnBase, emoji, style) {
  const url = `${cdnBase}?emoji=${encodeURIComponent(emoji.char)}&style=${style}`;
  try {
    const r = await fetch(url, { method: 'HEAD' });
    return { char: emoji.char, hex: emoji.hex, name: emoji.name, style, status: r.status, url };
  } catch (_) {
    return { char: emoji.char, hex: emoji.hex, name: emoji.name, style, status: 0, url };
  }
}

async function startScan() {
  await loadEmojiList();
  if (emojiList.length === 0) return;

  scanning = true;
  results  = [];
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display  = '';
  document.getElementById('resultList').innerHTML   = '';

  const cdnBase = document.getElementById('cdnBase').value.trim();
  const styleVal = document.getElementById('styleSelect').value;
  const styles   = styleVal === 'all' ? ALL_STYLES : [styleVal];
  const concurrency = parseInt(document.getElementById('concurrency').value) || 8;

  // Build full work queue: every emoji × every selected style
  const queue = [];
  for (const style of styles) {
    for (const emoji of emojiList) {
      queue.push({ emoji, style });
    }
  }
  const total = queue.length;
  document.getElementById('statusMsg').textContent = `Scanning ${total} combinations…`;

  let idx = 0;
  async function worker() {
    while (idx < queue.length && scanning) {
      const item = queue[idx++];
      const r = await checkOne(cdnBase, item.emoji, item.style);
      results.push(r);
      updateStats(total);
      // Only re-render on errors or every 50 items to avoid DOM thrashing
      if (r.status !== 200 || results.length % 50 === 0) renderResults();
    }
  }

  const workers = Array.from({ length: concurrency }, () => worker());
  await Promise.all(workers);

  scanning = false;
  document.getElementById('startBtn').style.display = '';
  document.getElementById('stopBtn').style.display  = 'none';
  const errCount = results.filter(r => r.status !== 200).length;
  document.getElementById('statusMsg').textContent =
    `Done. ${results.length} checked, ${errCount} errors found.`;
  renderResults();
}

function stopScan() {
  scanning = false;
  document.getElementById('startBtn').style.display = '';
  document.getElementById('stopBtn').style.display  = 'none';
  document.getElementById('statusMsg').textContent  = 'Scan stopped.';
}

function exportResults() {
  const errors = results.filter(r => r.status !== 200);
  const blob   = new Blob([JSON.stringify({ errors, total: results.length }, null, 2)],
                          { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `emoji-scan-errors-${Date.now()}.json`;
  a.click();
}

loadEmojiList();
</script>
</body>
</html>
